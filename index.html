<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Alex's VR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
     <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
    <script src="script.js"></script>
</head>

<body>
    <a-scene>
        <!--ASSETS-->
        <a-assets>
            <img id="cat" src="images/cat.jpg" preload="auto">

            <img id="kitten" src="images/susannp4-cat-2083492_1920.jpg" preload="auto">
                 <!-- Video -->
            <video id="videoclip" loop="true" src="tvAssets/harry_potter.mp4" crossorigin="anonymous" preload="auto"></video>
            <!-- Buttons and Background -->
                <img id="play" src="tvAssets/btnPlay.png" preload="auto">
                <img id="pause" src="tvAssets/btnPause.png" preload="auto">
                <img id="tv_background" src="tvAssets/tv_background.jpg" preload="auto">

        </a-assets>
    
        <a-entity environment="preset: starry; dressingAmount: 99; skyColor:#blue"></a-entity>
    <!--Museum Start-->
    <a-cylinder id="floor" position="0 0 0" radius="7.5" height="0.1" src="images/carpet.jpg"></a-cylinder>
    <a-box id="wall1" position="0 1.473 4.907" scale="10 3 0.1" src="images/wallpaper.jpg.jpg"></a-box>
    <a-box id="wall2" position="0 1.473 -4.907" scale="10 3 0.1" src="images/wallpaper.jpg.jpg"></a-box>
    <a-box id="wall3" position="5.049 1.454 -0.008" rotation="0 -90 0" scale="10 3 0.1" src="images/wallpaper.jpg.jpg"></a-box>
    <a-box id="wall4" position="-5.049 1.454 -0.008" rotation="0 -90 0" scale="10 3 0.1" src="images/wallpaper.jpg.jpg"></a-box>
<!--roof-->
    <a-cylinder id="triangle_front" segments-radial="3" position="0 3.874 4.907" rotation="-90 0 0" scale="5.774 0.2 1.8" src="images/wood.jpg"></a-cylinder>
    <a-cylinder id="triangle_back" segments-radial="3" position="0 3.874 -4.907" rotation="-90 0 0" scale="5.774 0.2 1.8" src="images/wood.jpg"></a-cylinder>
    <a-box id="roof_right" position="2.580 4.328 0" rotation="28.433 90 0" scale="10.931 0.20 6.110" src="images/wood.jpg"></a-box>
    <a-box id="roof_left" position="-2.599 4.321 -0.017" rotation="28.433 -90 0" scale="10.931 0.20 6.130" src="images/wood.jpg"></a-box>
        <!--Art-->
    <a-plane id="art1" src="#cat" scale="7 4 0.05" rotation="0 0 0" position="-0.162 1.934 -4.792"></a-plane>
    <a-plane id="kitten" src="#kitten" scale="4.981 3 1.082" rotation="0 -90 0" position="4.970 1.934 0.419"></a-plane>



<!--3D Object-->
<a-obj-model id="3dModel1" src="images/tinker.obj" mtl="images/obj.mtl" position="0 0 0" rotation="-90 0 0" scale="1 1 1"></a-obj-model>
    
<!--tv-->
<!-- TV with Play and Pause -->
<a-entity>
  <a-video src="#videoclip" position="-4.968 1.600 -3.805" rotation="0 90 0" width="2" height="1.125"></a-video>
  <!-- TV background -->
  <a-plane id="videoControls" position="-4.955 0.854 -3.814" scale="2 0.386 1.714" rotation="0 90 0" opacity="1" src="#tv_background">
    <!-- Play button -->
    <a-plane id="vidplaybox" src="#play" scale="0.122 0.678 0.122" position="-0.350 0 .01" shader="flat" transparent="true" videoplayer></a-plane>
    <!-- Stop button -->
    <a-plane id="vidpausebox" src="#pause" scale="0.122 0.678 0.122" position="0.350 0 .01" shader="flat" transparent="true" videopauser></a-plane>
  </a-plane>
</a-entity>
<!-- Allows clicking with the mouse -->
<a-entity cursor="rayOrigin: mouse"></a-entity>

</a-scene>
</body>
</html>
